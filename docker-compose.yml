# Federated Healthcare AI Platform — local enterprise development & deployment
# Usage: cp .env.example .env && docker compose up --build
#
# Environment: variables in .env are passed to services; shell exports override .env.

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: fedhealth-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Core secrets & connectivity (fallbacks for first-time setup)
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@host.docker.internal:5432/fedhealth_ai}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_HOURS: ${JWT_EXPIRE_HOURS:-12}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      PYTHONUNBUFFERED: "1"
      AUTH_ADMIN_PASSWORD: ${AUTH_ADMIN_PASSWORD:-admin123}
      AUTH_DOCTOR_PASSWORD: ${AUTH_DOCTOR_PASSWORD:-doctor123}
      AUTH_ANALYST_PASSWORD: ${AUTH_ANALYST_PASSWORD:-analyst123}
      MODEL_PATH: ${MODEL_PATH:-/app/backend/models/global_federated_model.pth}
      SCALER_PATH: ${SCALER_PATH:-/app/backend/scalers/scaler.joblib}
    volumes:
      - ./backend/models:/app/backend/models
      - ./backend/scalers:/app/backend/scalers
      - ./backend/processed_data:/app/backend/processed_data
      - ./backend/reports:/app/backend/reports
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - fedhealth-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: fedhealth-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - fedhealth-net

networks:
  fedhealth-net:
    driver: bridge
